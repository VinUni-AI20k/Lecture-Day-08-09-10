version: "1.1"
dataset: "kb_chunk_export"
owner_team: "day10-data-platform"

schema_cleaned:
  chunk_id:
    type: string
    required: true
    description: "Stable ID after cleaning (hash over doc/chunk/seq)"
  doc_id:
    type: string
    required: true
    description: "Logical source document key"
  chunk_text:
    type: string
    required: true
    constraints:
      min_length: 8
  effective_date:
    type: date
    required: true
  exported_at:
    type: datetime
    required: true

quality_rules:
  - id: "no_duplicate_chunk_text"
    severity: "warn"
  - id: "no_stale_refund_window"
    description: "Refund policy must not keep stale 14-day wording"
    severity: "halt"
  - id: "exported_at_iso_utc"
    description: "All cleaned exported_at values must be normalized to UTC ISO"
    severity: "halt"
  - id: "effective_not_after_exported"
    description: "effective_date cannot be after exported_at date"
    severity: "halt"

freshness:
  measured_at: "ingest_and_publish"
  sla_hours: 24
  alert_channel: "#day10-data-observability"

canonical_sources:
  - path: "data/docs/policy_refund_v4.txt"
    doc_id: "policy_refund_v4"
  - path: "data/docs/sla_p1_2026.txt"
    doc_id: "sla_p1_2026"
  - path: "data/docs/it_helpdesk_faq.txt"
    doc_id: "it_helpdesk_faq"
  - path: "data/docs/hr_leave_policy.txt"
    doc_id: "hr_leave_policy"

allowed_doc_ids:
  - policy_refund_v4
  - sla_p1_2026
  - it_helpdesk_faq
  - hr_leave_policy

policy_versioning:
  hr_leave_min_effective_date: "2026-01-01"
  refund_window_days: 7

doc_topic_keywords:
  policy_refund_v4:
    - "hoàn tiền"
    - "refund"
    - "ngày làm việc"
  sla_p1_2026:
    - "p1"
    - "sla"
  it_helpdesk_faq:
    - "đăng nhập"
    - "mật khẩu"
    - "tài khoản"
  hr_leave_policy:
    - "phép năm"
    - "chính sách"
